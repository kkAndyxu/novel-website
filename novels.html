<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说库 - 墨韵小说</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">📖</span>
        <span>墨韵小说</span>
      </a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="novels.html" class="active">小说库</a>
        <a href="community.html">书友圈</a>
        <a href="inspiration.html">写作灵感</a>
        <a href="login.html" class="nav-btn">🔐 登录</a>
      </div>
      <div class="nav-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="搜索小说、作者..." id="search-input">
      </div>
      <button class="nav-menu-btn">☰</button>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">

    <!-- 页面标题 -->
    <div class="section-header" style="margin-bottom: 20px;">
      <h1 class="section-title" style="font-size: 1.5rem;"><span class="icon">📚</span> 小说库</h1>
      <span style="color: var(--text-light); font-size: 0.9rem;" id="novel-count"></span>
    </div>

    <!-- 分类标签 -->
    <div class="category-tags" id="category-tags">
      <div class="loading"><div class="loading-spinner"></div></div>
    </div>

    <!-- 搜索结果提示 -->
    <div id="search-hint" style="display:none; margin-bottom: 20px; color: var(--text-light); font-size: 0.9rem;">
      搜索 "<span id="search-keyword"></span>" 的结果：
    </div>

    <!-- 小说列表 -->
    <div class="novel-grid" id="novel-grid">
      <div class="loading"><div class="loading-spinner"></div></div>
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="empty-state" style="display: none;">
      <div class="empty-icon">📭</div>
      <h3>暂无相关小说</h3>
      <p>换个关键词试试，或者发布你的第一部作品吧！</p>
      <a href="publish.html" class="btn btn-primary">✏️ 发布小说</a>
    </div>

  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <h3>📖 墨韵小说</h3>
        <p>一个开放的原创文学创作平台。</p>
      </div>
      <div class="footer-links">
        <h4>快速导航</h4>
        <a href="index.html">首页</a>
        <a href="novels.html">小说库</a>
        <a href="inspiration.html">写作灵感</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2026 墨韵小说</p>
    </div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="noveldb.js"></script>

  <script>
    let currentCategory = '全部';
    let currentSearch = '';

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      // 从URL参数初始化
      const urlCategory = getQueryParam('category');
      const urlSearch = getQueryParam('search');

      if (urlCategory) currentCategory = urlCategory;
      if (urlSearch) {
        currentSearch = urlSearch;
        document.getElementById('search-input').value = urlSearch;
      }

      await loadCategories();
      await loadNovels();
    });

    // 加载分类
    async function loadCategories() {
      const categories = await NovelDB.getCategories();
      document.getElementById('category-tags').innerHTML = categories.map(cat => `
        <span class="tag ${cat === currentCategory ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</span>
      `).join('');
    }

    // 加载小说
    async function loadNovels() {
      let novels;
      if (currentSearch) {
        novels = await NovelDB.search(currentSearch);
        document.getElementById('search-hint').style.display = 'block';
        document.getElementById('search-keyword').textContent = currentSearch;
      } else {
        novels = await NovelDB.filterByCategory(currentCategory);
        document.getElementById('search-hint').style.display = 'none';
      }

      const grid = document.getElementById('novel-grid');
      const empty = document.getElementById('empty-state');
      const count = document.getElementById('novel-count');

      count.textContent = `共 ${novels.length} 部作品`;

      if (novels.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
      } else {
        grid.style.display = 'grid';
        empty.style.display = 'none';
        grid.innerHTML = novels.map(createNovelCard).join('');
      }
    }

    // 分类筛选
    async function filterByCategory(category) {
      currentCategory = category;
      currentSearch = '';
      document.getElementById('search-input').value = '';
      await loadCategories();
      await loadNovels();
    }

    // 搜索
    document.getElementById('search-input').addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        currentSearch = e.target.value.trim();
        currentCategory = '全部';
        await loadCategories();
        await loadNovels();
      }
    });
  </script>

</body>
</html>
