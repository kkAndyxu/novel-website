<body>

  <!-- 导航栏 -->
  <nav class="navbar">

      <a href="index.html" class="nav-logo">
        <span class="logo-icon">📖</span>
        <span>墨韵小说</span>

    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">

    <!-- Hero 区域 -->
    <section class="hero">
      <h1>✨ 用文字编织梦想，用故事打动人心</h1>

      <div class="hero-actions">
        <a href="novels.html" class="btn btn-primary">📚 开始阅读</a>
        <a href="publish.html" class="btn btn-outline">✏️ 发布我的小说</a>
      </div>
    </section>

    <!-- 热门推荐 -->
    <section>
      <div class="section-header">
        <h2 class="section-title"><span class="icon">🔥</span> 热门推荐</h2>
        <a href="novels.html" class="section-more">查看更多 →</a>
      </div>
      <div class="novel-grid" id="featured-grid">
        <!-- 动态填充 -->
      </div>
    </section>

    <!-- 最新更新 -->
    <section>
      <div class="section-header">
        <h2 class="section-title"><span class="icon">🆕</span> 最新更新</h2>
        <a href="novels.html" class="section-more">查看更多 →</a>
      </div>
      <div class="novel-grid" id="latest-grid">

    </section>

    <!-- 写作灵感预览 -->
    <section>
      <div class="section-header">
        <h2 class="section-title"><span class="icon">💡</span> 写作灵感</h2>

        <!-- 动态填充 -->
      </div>
    </section>

  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <h3>📖 墨韵小说</h3>
        <p>一个开放的原创文学创作平台，致力于为每一位创作者提供展示才华的舞台，为每一位读者带来精彩的故事体验。</p>
      </div>
      <div class="footer-links">
        <h4>快速导航</h4>
        <a href="index.html">首页</a>
        <a href="novels.html">小说库</a>
        <a href="inspiration.html">写作灵感</a>
        <a href="publish.html">发布作品</a>
      </div>
      <div class="footer-links">
        <h4>热门分类</h4>
        <a href="novels.html?category=科幻">科幻</a>
        <a href="novels.html?category=古风">古风</a>
        <a href="novels.html?category=都市">都市</a>
        <a href="novels.html?category=悬疑">悬疑</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2026 墨韵小说 - 用文字编织梦想</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    // 渲染热门推荐
    const featured = NovelDB.getFeatured(4);
    document.getElementById('featured-grid').innerHTML = featured.map(createNovelCard).join('');

    // 渲染最新更新
    const latest = NovelDB.getLatest(6);
    document.getElementById('latest-grid').innerHTML = latest.map(createNovelCard).join('');

    // 渲染灵感预览
    const inspirations = [
      {
        title: '如何写出引人入胜的开头',
        content: '一个好的开头是成功的一半。尝试用悬念、冲突或独特的场景来抓住读者的注意力，让他们忍不住继续往下读。',
        tag: '写作技巧'
      },
      {
        title: '2026年热门题材推荐',
        content: '赛博朋克、东方奇幻、时间循环、平行宇宙……这些题材正在崛起。找到你感兴趣的领域，开始你的创作之旅吧！',
        tag: '题材推荐'
      },
      {
        title: '塑造令人难忘的角色',
        content: '角色是故事的灵魂。给你的角色设定独特的性格、背景和成长弧线，让读者能够产生共鸣和情感连接。',
        tag: '角色塑造'
      }
    ];
    document.getElementById('inspiration-preview').innerHTML = inspirations.map(item => `
      <div class="inspiration-card">
        <h3>${item.title}</h3>
        <p>${item.content}</p>
        <div class="card-footer">
          <span class="card-tag">${item.tag}</span>
          <a href="inspiration.html" class="section-more">阅读详情 →</a>
        </div>
      </div>
    `).join('');
  </script>

</body>
</html>
