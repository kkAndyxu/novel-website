<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 墨韵小说</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">📖</span>
        <span>墨韵小说</span>
      </a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="novels.html">小说库</a>
        <a href="inspiration.html">写作灵感</a>
        <a href="login.html" class="nav-btn active">🔐 登录</a>
      </div>
      <button class="nav-menu-btn">☰</button>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>📖 墨韵小说</h1>
        <p>用文字编织梦想，用故事打动人心</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">登录</div>
        <div class="auth-tab" onclick="switchTab('register')">注册</div>
      </div>

      <!-- 登录表单 -->
      <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" class="form-input" id="login-email" placeholder="请输入邮箱" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" class="form-input" id="login-password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 8px;">
          登录
        </button>
      </form>

      <!-- 注册表单 -->
      <form class="auth-form" id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" class="form-input" id="register-email" placeholder="请输入邮箱" required>
        </div>
        <div class="form-group">
          <label>笔名</label>
          <input type="text" class="form-input" id="register-penname" placeholder="你的笔名（2-12个字符）" minlength="2" maxlength="12" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" class="form-input" id="register-password" placeholder="请输入密码（至少6位）" minlength="6" required>
        </div>
        <div class="form-group">
          <label>确认密码</label>
          <input type="password" class="form-input" id="register-confirm" placeholder="请再次输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 8px;">
          注册
        </button>
      </form>

      <div class="auth-footer">
        <p>登录即表示同意我们的 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></p>
      </div>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>

  <script>
    // 切换登录/注册标签
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

      if (tab === 'login') {
        document.querySelector('.auth-tab:first-child').classList.add('active');
        document.getElementById('login-form').classList.add('active');
      } else {
        document.querySelector('.auth-tab:last-child').classList.add('active');
        document.getElementById('register-form').classList.add('active');
      }
    }

    // 处理登录
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      const result = await UserManager.login(email, password);
      if (result.success) {
        // 检查是否有来源页面
        const redirect = getQueryParam('redirect') || 'index.html';
        setTimeout(() => {
          window.location.href = redirect;
        }, 500);
      }
    }

    // 处理注册
    async function handleRegister(e) {
      e.preventDefault();
      const email = document.getElementById('register-email').value;
      const penName = document.getElementById('register-penname').value;
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;

      if (password !== confirm) {
        showToast('两次输入的密码不一致', 'error');
        return;
      }

      const result = await UserManager.register(email, password, penName);
      if (result.success) {
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 500);
      }
    }

    // 检查是否已登录
    auth.onAuthStateChanged((user) => {
      if (user) {
        // 已登录，跳转到首页
        window.location.href = 'index.html';
      }
    });
  </script>

</body>
</html>
