<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说库 - 墨韵小说</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">📖</span>
        <span>墨韵小说</span>
      </a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="novels.html" class="active">小说库</a>
        <a href="inspiration.html">写作灵感</a>
        <a href="publish.html" class="nav-btn">✏️ 发布作品</a>
      </div>
      <div class="nav-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="搜索小说、作者..." id="search-input">
      </div>
      <button class="nav-menu-btn">☰</button>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">

    <!-- 页面标题 -->
    <div class="section-header" style="margin-bottom: 20px;">
      <h1 class="section-title" style="font-size: 1.5rem;"><span class="icon">📚</span> 小说库</h1>
      <span style="color: var(--text-light); font-size: 0.9rem;" id="novel-count"></span>
    </div>

    <!-- 分类标签 -->
    <div class="category-tags" id="category-tags">
      <!-- 动态填充 -->
    </div>

    <!-- 搜索结果提示 -->
    <div id="search-hint" style="display:none; margin-bottom: 20px; color: var(--text-light); font-size: 0.9rem;">
      搜索 "<span id="search-keyword"></span>" 的结果：
    </div>

    <!-- 小说列表 -->
    <div class="novel-grid" id="novel-grid">
      <!-- 动态填充 -->
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="empty-state" style="display: none;">
      <div class="empty-icon">📭</div>
      <h3>暂无相关小说</h3>
      <p>换个关键词试试，或者发布你的第一部作品吧！</p>
      <a href="publish.html" class="btn btn-primary">✏️ 发布小说</a>
    </div>

  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <h3>📖 墨韵小说</h3>
        <p>一个开放的原创文学创作平台，致力于为每一位创作者提供展示才华的舞台，为每一位读者带来精彩的故事体验。</p>
      </div>
      <div class="footer-links">
        <h4>快速导航</h4>
        <a href="index.html">首页</a>
        <a href="novels.html">小说库</a>
        <a href="inspiration.html">写作灵感</a>
        <a href="publish.html">发布作品</a>
      </div>
      <div class="footer-links">
        <h4>热门分类</h4>
        <a href="novels.html?category=科幻">科幻</a>
        <a href="novels.html?category=古风">古风</a>
        <a href="novels.html?category=都市">都市</a>
        <a href="novels.html?category=悬疑">悬疑</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2026 墨韵小说 - 用文字编织梦想</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    let currentCategory = '全部';
    let currentSearch = '';

    // 初始化分类标签
    function renderCategories() {
      const categories = NovelDB.getCategories();
      const container = document.getElementById('category-tags');
      container.innerHTML = categories.map(cat => `
        <span class="tag ${cat === currentCategory ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</span>
      `).join('');
    }

    // 渲染小说列表
    function renderNovels() {
      let novels;
      if (currentSearch) {
        novels = NovelDB.search(currentSearch);
        document.getElementById('search-hint').style.display = 'block';
        document.getElementById('search-keyword').textContent = currentSearch;
      } else {
        novels = NovelDB.filterByCategory(currentCategory);
        document.getElementById('search-hint').style.display = 'none';
      }

      const grid = document.getElementById('novel-grid');
      const empty = document.getElementById('empty-state');
      const count = document.getElementById('novel-count');

      count.textContent = `共 ${novels.length} 部作品`;

      if (novels.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
      } else {
        grid.style.display = 'grid';
        empty.style.display = 'none';
        grid.innerHTML = novels.map(createNovelCard).join('');
      }
    }

    // 分类筛选
    function filterByCategory(category) {
      currentCategory = category;
      currentSearch = '';
      document.getElementById('search-input').value = '';
      renderCategories();
      renderNovels();
    }

    // 搜索
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        currentSearch = searchInput.value.trim();
        currentCategory = '全部';
        renderCategories();
        renderNovels();
      }
    });

    // 从URL参数初始化
    const urlCategory = getQueryParam('category');
    const urlSearch = getQueryParam('search');

    if (urlCategory) {
      currentCategory = urlCategory;
    }
    if (urlSearch) {
      currentSearch = urlSearch;
      searchInput.value = urlSearch;
    }

    renderCategories();
    renderNovels();
  </script>

</body>
</html>
